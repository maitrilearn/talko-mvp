<!DOCTYPE html>
<html>
<head>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
</head>

<body>

<h2>You are anonymous</h2>

<button onclick="start()">Start Call</button>
<button onclick="end()">End Call</button>

<script>

let client;

async function start(){

 const APP_ID="808c9563be754fbc8328f26d4df5aaea";
 const room=localStorage.getItem("room");

  client = AgoraRTC.createClient({mode:"rtc",codec:"vp8"});

  // ⭐ LISTEN FOR REMOTE USERS
  client.on("user-published", async (user, mediaType) => {

    await client.subscribe(user, mediaType);

    if(mediaType === "audio"){
      const remoteTrack = user.audioTrack;
      remoteTrack.play();   // ⭐ THIS WAS MISSING
    }
  });

  await client.join(APP_ID, room, null, null);

  const localTrack =
      await AgoraRTC.createMicrophoneAudioTrack();

  await client.publish([localTrack]);
}
</script>

</body>
</html>
